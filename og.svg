<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Optes Perimeter Intelligence — awareness before the event, on ground that stays yours.">
  <defs>
    <radialGradient id="og-core" cx="76%" cy="50%" r="42%">
      <stop offset="0%" stop-color="#5BD0E0" stop-opacity="0.20"/>
      <stop offset="38%" stop-color="#5BD0E0" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#5BD0E0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="og-fade" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
      <stop offset="58%" stop-color="#fff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <mask id="og-mask">
      <rect width="1200" height="630" fill="black"/>
      <circle cx="912" cy="315" r="360" fill="url(#og-fade)"/>
    </mask>
  </defs>

  <rect width="1200" height="630" fill="#07090D"/>
  <rect width="1200" height="630" fill="url(#og-core)"/>

  <g mask="url(#og-mask)" fill="none" stroke="#9AA6B8" stroke-width="1">
    <circle cx="912" cy="315" r="56"  stroke-opacity="0.16"/>
    <circle cx="912" cy="315" r="104" stroke-opacity="0.13"/>
    <circle cx="915" cy="312" r="156" stroke-opacity="0.11" stroke-dasharray="3 10"/>
    <circle cx="912" cy="315" r="210" stroke-opacity="0.09"/>
    <circle cx="909" cy="318" r="268" stroke-opacity="0.07" stroke-dasharray="3 12"/>
    <circle cx="912" cy="315" r="330" stroke-opacity="0.05"/>
  </g>
  <circle cx="912" cy="315" r="56" fill="none" stroke="#5BD0E0" stroke-width="1.2" stroke-opacity="0.55"/>
  <circle cx="912" cy="315" r="6" fill="#5BD0E0" fill-opacity="0.85"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <text x="96" y="150" fill="#ECEFF4" font-size="26" font-weight="500" letter-spacing="9">OPTES</text>
    <line x1="98" y1="172" x2="148" y2="172" stroke="#5BD0E0" stroke-width="2" stroke-opacity="0.8"/>
    <text x="160" y="178" fill="#5C6675" font-size="20" letter-spacing="5" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">PERIMETER INTELLIGENCE</text>
  </g>

  <text x="92" y="316" fill="#ECEFF4" font-size="74" letter-spacing="-1"
        font-family="'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, 'Times New Roman', serif">The pattern arrives</text>
  <text x="92" y="396" fill="#ECEFF4" font-size="74" letter-spacing="-1"
        font-family="'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, 'Times New Roman', serif">before the threat.</text>

  <text x="94" y="470" fill="#9AA6B8" font-size="27"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">Awareness before the event — on ground that stays yours.</text>

  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
    <rect x="92" y="520" width="6" height="6" fill="#5BD0E0"/>
    <text x="112" y="528" fill="#5C6675" font-size="17" letter-spacing="4">SOVEREIGN · EDGE-DEPLOYED · PRIVATE</text>
  </g>
